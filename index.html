<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>神理 初級テスト ○×クイズ</title>
  <style>
    * { box-sizing: border-box; }
 
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --blue: #1976d2;
      --light-blue: #42a5f5;
      --red: #d50000;
      --gray: #666;
      --bg-gray: #efefef;
      --ok-bg: #d8efff;
      --ng-bg: #ffd9d9;
    }
 
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #fff;
      color: #111;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
 
    body {
      overflow-x: hidden;
    }
 
    button, input {
      font-family: inherit;
    }
 
    button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
 
    a {
      color: #0b57d0;
      text-decoration: none;
      cursor: pointer;
    }
 
    a:hover {
      text-decoration: underline;
    }
 
    .screen {
      display: none;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }
 
    .screen.active {
      display: flex;
    }
 
    /* ドア演出 */
    .door-transition {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: none;
      overflow: hidden;
    }
 
    .door-transition.active {
      display: block;
    }
 
    .door-panel {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(180deg, #6d4c41 0%, #4e342e 50%, #3e2723 100%);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.08);
    }
 
    .door-left {
      left: 0;
      border-right: 2px solid rgba(255,255,255,.15);
      animation: openLeftDoor .8s ease forwards;
    }
 
    .door-right {
      right: 0;
      border-left: 2px solid rgba(255,255,255,.15);
      animation: openRightDoor .8s ease forwards;
    }
 
    .door-panel::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 24px;
      height: 24px;
      margin-top: -12px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffd54f, #c49000);
      box-shadow: 0 0 10px rgba(0,0,0,.25);
    }
 
    .door-left::before { right: 26px; }
    .door-right::before { left: 26px; }
 
    @keyframes openLeftDoor {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }
 
    @keyframes openRightDoor {
      from { transform: translateX(0); }
      to { transform: translateX(100%); }
    }
 
    /* ランディング画面 */
    #landing-screen {
      background: #fff;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding:
        max(20px, var(--safe-top))
        max(16px, var(--safe-right))
        max(20px, var(--safe-bottom))
        max(16px, var(--safe-left));
    }
 
    .landing-inner {
      width: min(100%, 1000px);
      margin: 0 auto;
    }
 
    .title-line-1 {
      font-size: clamp(20px, 5vw, 40px);
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.4;
    }
 
    .title-line-2 {
      font-size: clamp(16px, 4.2vw, 28px);
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.6;
    }
 
    .title-line-3 {
      font-size: clamp(52px, 14vw, 110px);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 10px;
      letter-spacing: .08em;
      word-break: keep-all;
    }
 
    .title-line-4 {
      font-size: clamp(24px, 6vw, 50px);
      font-weight: 900;
      margin-bottom: 36px;
      letter-spacing: .06em;
      color: #1976d2;
    }
 
    ruby rt {
      font-size: 0.45em;
    }
 
    .rainbow-btn {
      border: none;
      border-radius: 999px;
      padding: 18px 44px;
      min-height: 56px;
      font-size: clamp(24px, 6vw, 44px);
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(90deg, #ff1744, #ff9100, #ffee58, #00c853, #00b0ff, #304ffe, #d500f9);
      background-size: 300% 300%;
      box-shadow: 0 14px 34px rgba(0,0,0,.18);
      animation: rainbowFlow 5s linear infinite;
      transition: transform .15s ease, box-shadow .15s ease;
    }
 
    .rainbow-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 18px 38px rgba(0,0,0,.24);
    }
 
    @keyframes rainbowFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
 
    /* メニュー画面 */
    #menu-screen {
      background: #fff;
      align-items: center;
      justify-content: center;
      padding:
        max(16px, var(--safe-top))
        max(12px, var(--safe-right))
        max(16px, var(--safe-bottom))
        max(12px, var(--safe-left));
    }
 
    .menu-card {
      width: min(100%, 920px);
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.07);
      padding: clamp(16px, 4vw, 28px);
      max-height: 96dvh;
      overflow-y: auto;
    }
 
    .menu-title {
      text-align: center;
      font-size: clamp(22px, 5.5vw, 40px);
      font-weight: 900;
      margin-bottom: 22px;
      line-height: 1.4;
    }
 
    .form-row { margin-bottom: 18px; }
 
    .label {
      display: block;
      font-size: clamp(16px, 4.2vw, 20px);
      font-weight: 700;
      margin-bottom: 10px;
    }
 
    .nickname-input {
      width: 100%;
      font-size: clamp(16px, 4.2vw, 22px);
      padding: 14px 16px;
      border: 2px solid #cfcfcf;
      border-radius: 14px;
      outline: none;
    }
 
    .nickname-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(25,118,210,.12);
    }
 
    .error-text {
      color: #d32f2f;
      font-size: 14px;
      min-height: 20px;
      margin-top: 8px;
    }
 
    .menu-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 8px;
      margin-bottom: 24px;
    }
 
    .menu-btn {
      border: none;
      border-radius: 16px;
      padding: 18px 14px;
      min-height: 64px;
      font-size: clamp(16px, 4vw, 21px);
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #1565c0, #42a5f5);
      box-shadow: 0 8px 24px rgba(21,101,192,.22);
      transition: transform .15s ease, box-shadow .15s ease;
    }
 
    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(21,101,192,.28);
    }
 
    .menu-btn.practice {
      background: linear-gradient(135deg, #2e7d32, #66bb6a);
      box-shadow: 0 8px 24px rgba(46,125,50,.24);
    }
 
    .menu-btn.all {
      background: linear-gradient(135deg, #b71c1c, #ef5350);
      box-shadow: 0 8px 24px rgba(183,28,28,.24);
      grid-column: 1 / -1;
    }
 
    .notes {
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid #d9e8ff;
      padding: clamp(14px, 3.5vw, 20px);
      line-height: 1.9;
      font-size: clamp(15px, 4vw, 18px);
    }
 
    .notes-title {
      font-weight: 900;
      font-size: clamp(18px, 4.6vw, 22px);
      margin-bottom: 8px;
    }
 
    /* クイズ画面 */
    #quiz-screen {
      background: #fff;
      align-items: stretch;
      justify-content: stretch;
      transition: background-color .12s linear;
    }
 
    #quiz-screen.flash-correct { background: var(--ok-bg); }
    #quiz-screen.flash-wrong { background: var(--ng-bg); }
 
    .quiz-wrap {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        max(8px, var(--safe-top))
        max(8px, var(--safe-right))
        max(8px, var(--safe-bottom))
        max(8px, var(--safe-left));
    }
 
    .quiz-top { padding: 8px 8px 0; }
    .timer-wrap { width: 100%; }
 
    .timer-bar-bg {
      width: 100%;
      height: clamp(16px, 3.5vw, 24px);
      background: #fff;
      border: 2px solid #d8d8d8;
      border-radius: 999px;
      overflow: hidden;
    }
 
    .timer-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--light-blue), var(--blue));
      transition: width .1s linear;
    }
 
    .question-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 34px) clamp(10px, 3vw, 20px) 12px;
      overflow-y: auto;
    }
 
    .question-text {
      width: min(100%, 1200px);
      text-align: center;
      font-weight: 900;
      line-height: 1.55;
      font-size: clamp(22px, 5.4vw, 48px);
      user-select: none;
      word-break: keep-all;
      overflow-wrap: anywhere;
      letter-spacing: .01em;
      padding: 0.2em 0.4em;
      border-radius: 12px;
      background: rgba(240, 246, 255, 0.7);
      box-shadow: 0 2px 12px rgba(25, 118, 210, 0.07);
    }
 
    .answer-row {
      width: 100%;
      min-height: 30vh;
      height: 34vh;
      display: flex;
      border-top: 2px solid #ddd;
      margin-top: auto;
    }
 
    .answer-btn {
      width: 50%;
      height: 100%;
      border: none;
      cursor: pointer;
      font-weight: 900;
      font-size: clamp(64px, 18vw, 180px);
      background: #fff;
      transition: background .15s ease, transform .05s ease, opacity .15s ease;
      user-select: none;
    }
 
    .answer-btn:active { transform: scale(.995); }
    .answer-btn[disabled] { opacity: .78; cursor: default; }
    .answer-btn.maru { color: var(--red); }
    .answer-btn.batsu { color: #222; border-left: 2px solid #ddd; }
 
    /* リザルト画面 */
    #result-screen {
      position: relative;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding:
        max(20px, var(--safe-top))
        max(16px, var(--safe-right))
        max(20px, var(--safe-bottom))
        max(16px, var(--safe-left));
      overflow: hidden;
    }
 
    #result-screen.pass { background: #fff; }
    #result-screen.fail { background: var(--bg-gray); }
 
    .result-inner {
      position: relative;
      z-index: 2;
      width: min(100%, 1100px);
    }
 
    .result-message {
      font-size: clamp(20px, 4.6vw, 40px);
      font-weight: 900;
      line-height: 1.7;
      margin-bottom: 20px;
    }
 
    .result-badge {
      font-weight: 900;
      line-height: 1;
      margin-bottom: 28px;
      letter-spacing: .08em;
    }
 
    .result-badge.pass {
      font-size: clamp(60px, 16vw, 180px);
      color: #d81b60;
      text-shadow: 0 4px 18px rgba(216,27,96,.15);
    }
 
    .result-badge.fail {
      font-size: clamp(54px, 14vw, 150px);
      color: #555;
    }
 
    .result-challenge {
      font-size: clamp(16px, 4vw, 24px);
      font-weight: 700;
      color: #e65100;
      margin-bottom: 20px;
      min-height: 1.6em;
    }

    .result-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }
 
    .result-links a {
      font-size: clamp(16px, 4.5vw, 20pt);
      font-weight: 700;
      line-height: 1.8;
    }
 
    /* コンフェッティ */
    .confetti {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      display: none;
    }
 
    .confetti.show { display: block; }
 
    .confetti-piece {
      position: absolute;
      top: -40px;
      width: 12px;
      height: 22px;
      opacity: .92;
      animation-name: confettiFall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      transform: rotate(0deg);
      border-radius: 2px;
    }
 
    @keyframes confettiFall {
      0% { transform: translateY(-40px) rotate(0deg); }
      100% { transform: translateY(110dvh) rotate(720deg); }
    }
 
    /* レスポンシブ */
    @media (max-width: 1024px) {
      .menu-buttons { grid-template-columns: 1fr 1fr; }
      .answer-row { height: 32vh; }
    }
 
    @media (max-width: 768px) {
      .menu-buttons { grid-template-columns: 1fr; }
      .menu-btn { padding: 16px 12px; }
      .menu-btn.all { grid-column: auto; }
      .question-box { align-items: center; padding-top: 18px; }
      .question-text { width: 100%; max-width: 100%; }
      .answer-row { min-height: 28vh; height: 30vh; }
    }
 
    @media (max-width: 480px) {
      .title-line-3 { letter-spacing: .04em; }
      .rainbow-btn { width: 100%; max-width: 260px; padding: 16px 24px; }
      .menu-card { border-radius: 16px; }
      .question-text { font-size: clamp(20px, 5.8vw, 28px); line-height: 1.55; }
      .answer-row { min-height: 26vh; height: 28vh; }
      .answer-btn { font-size: clamp(58px, 20vw, 96px); }
      .result-links a { font-size: 18px; }
    }
 
    @media (max-height: 500px) and (orientation: landscape) {
      .quiz-wrap {
        padding-top: max(6px, var(--safe-top));
        padding-bottom: max(6px, var(--safe-bottom));
      }
      .question-box { padding-top: 10px; padding-bottom: 8px; }
      .question-text { font-size: clamp(18px, 3.2vw, 30px); line-height: 1.55; }
      .answer-row { min-height: 36vh; height: 40vh; }
      .answer-btn { font-size: clamp(52px, 12vw, 110px); }
    }
  </style>
</head>
<body>
  <div id="door-transition" class="door-transition">
    <div class="door-panel door-left"></div>
    <div class="door-panel door-right"></div>
  </div>
 
  <section id="landing-screen" class="screen active">
    <div class="landing-inner">
      <div class="title-line-1">挑戦者求む！！</div>
      <div class="title-line-2">
        <ruby>神<rt>かみ</rt></ruby>の<ruby>理<rt>ことわり</rt></ruby>と書いて
      </div>
      <div class="title-line-3">神理</div>
      <div class="title-line-4">初級テスト</div>
      <button id="enter-btn" class="rainbow-btn">入口</button>
    </div>
  </section>
 
  <section id="menu-screen" class="screen">
    <div class="menu-card">
      <div class="menu-title">○×クイズ 出題選択</div>
 
      <div class="form-row">
        <label for="nickname" class="label">ニックネーム（必須）</label>
        <input id="nickname" class="nickname-input" type="text" maxlength="40" placeholder="ニックネームを入力してください" />
        <div id="nickname-error" class="error-text"></div>
      </div>
 
      <div class="notes">
        <div class="notes-title">各問題を解くときの注意点</div>
        ① 各問題の制限時間は６０秒です。<br>
        ② 問題は、答え直すことはできません。<br>
        ③ 間違えた問題のみをやり直すことは出来ますが、正解ならば青い画面、間違いならば赤い画面になるだけです。<br>
        ④ ランダムで問題が出題されますので、何度でも挑戦してみてください。
      </div>

      <div class="menu-buttons">
        <button class="menu-btn practice" data-count="10">🔷 10問挑戦</button>
        <button class="menu-btn" data-count="30">🔶 30問挑戦</button>
        <button class="menu-btn" data-count="50">💎 50問挑戦</button>
        <button class="menu-btn" data-count="100">⭐ 100問挑戦</button>
        <button class="menu-btn all" data-count="9999">🔥 全問挑戦（233問）</button>
      </div>
    </div>
  </section>
 
  <section id="quiz-screen" class="screen">
    <div class="quiz-wrap">
      <div class="quiz-top">
        <div id="timer-wrap" class="timer-wrap">
          <div class="timer-bar-bg">
            <div id="timer-bar" class="timer-bar"></div>
          </div>
        </div>
      </div>
 
      <div class="question-box">
        <div id="question-text" class="question-text"></div>
      </div>
 
      <div class="answer-row">
        <button id="maru-btn" class="answer-btn maru" aria-label="○">○</button>
        <button id="batsu-btn" class="answer-btn batsu" aria-label="×">×</button>
      </div>
    </div>
  </section>
 
  <section id="result-screen" class="screen">
    <div id="confetti" class="confetti"></div>
    <div class="result-inner">
      <div id="result-message" class="result-message"></div>
      <div id="result-badge" class="result-badge"></div>
      <div id="result-challenge" class="result-challenge"></div>
      <div class="result-links">
        <a id="retry-link">間違った問題を再度解き直す</a>
        <a id="home-link">ホーム画面に戻る</a>
      </div>
    </div>
  </section>

    function selectQuestions(num) {
      if (num >= allQuestions.length) {
        return shuffle(allQuestions);
      }
      return shuffle(allQuestions).slice(0, num);
    }
 
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
 
    function showScreen(screen) {
      [landingScreen, menuScreen, quizScreen, resultScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
      window.scrollTo(0, 0);
    }
 
    function openDoorThen(callback) {
      doorTransition.innerHTML = '<div class="door-panel door-left"></div><div class="door-panel door-right"></div>';
      doorTransition.classList.add('active');
      setTimeout(() => {
        doorTransition.classList.remove('active');
        callback();
      }, 850);
    }
 
    function validateNickname() {
      const name = nicknameInput.value.trim();
      if (!name) {
        nicknameError.textContent = 'ニックネームを入力してください。';
        nicknameInput.focus();
        return false;
      }
      nicknameError.textContent = '';
      playerName = name;
      return true;
    }
 
    function fitQuestionText() {
      questionText.style.fontSize = '';
      questionText.style.lineHeight = '';
 
      const isSmallMobile    = window.innerWidth <= 480;
      const isMobile         = window.innerWidth <= 768;
      const isLandscapeSmall = window.innerHeight <= 500;
 
      if (isLandscapeSmall) {
        questionText.style.fontSize   = 'clamp(18px, 3.2vw, 30px)';
        questionText.style.lineHeight = '1.55';
      } else if (isSmallMobile) {
        questionText.style.fontSize   = 'clamp(20px, 5.8vw, 28px)';
        questionText.style.lineHeight = '1.55';
      } else if (isMobile) {
        questionText.style.fontSize   = 'clamp(22px, 5.4vw, 34px)';
        questionText.style.lineHeight = '1.55';
      } else {
        questionText.style.fontSize   = 'clamp(28px, 4vw, 48px)';
        questionText.style.lineHeight = '1.55';
      }
    }

    }
 
    function startTimer() {
      clearTimer();
      timeLeft = NORMAL_LIMIT_SECONDS;
      updateTimerBar();
      timerId = setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          updateTimerBar();
          clearTimer();
          handleAnswer('TIMEOUT');
          return;
        }
        updateTimerBar();
      }, 100);
    }
 
    function makeConfetti() {
      confetti.innerHTML = '';
      const colors = ['#ff1744','#ff9100','#ffee58','#00c853','#00b0ff','#304ffe','#d500f9'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left              = Math.random() * 100 + '%';
        piece.style.background        = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (3 + Math.random() * 4) + 's';
        piece.style.animationDelay    = (Math.random() * 2) + 's';
        piece.style.opacity           = String(0.6 + Math.random() * 0.4);
        piece.style.transform         = `rotate(${Math.random() * 360}deg)`;
        confetti.appendChild(piece);
      }
    }
 
    function renderQuestion() {
      const current = currentQuestions[currentIndex];
      questionText.textContent = current.q;
      fitQuestionText();
      answered = false;
      setButtonsDisabled(false);
 
      if (currentMode === 'normal') {
        timerWrap.style.display = 'block';
        startTimer();
      } else {
        timerWrap.style.display = 'none';
        clearTimer();
      }
    }
 
    function goNextQuestion() {
      currentIndex += 1;
      if (currentIndex >= currentQuestions.length) {
        if (currentMode === 'normal') {
          showResult();
        } else {
          alert('解き直しが終了しました。ホーム画面に戻ります。');
          backToHome();
        }
        return;
      }
      quizScreen.classList.remove('flash-correct', 'flash-wrong');
      renderQuestion();
    }
 
    function handleAnswer(choice) {
      if (answered) return;
      answered = true;
      setButtonsDisabled(true);
      clearTimer();
 
      const current   = currentQuestions[currentIndex];
      const correct   = current.a;
      const isCorrect = choice === correct;
 
      if (currentMode === 'normal') {
        if (isCorrect) {
          correctCount += 1;
        } else {
          wrongQuestions.push(current);
        }
        setTimeout(goNextQuestion, 180);
      } else {
        if (isCorrect) {
          quizScreen.classList.add('flash-correct');
          quizScreen.classList.remove('flash-wrong');
        } else {
          quizScreen.classList.add('flash-wrong');
          quizScreen.classList.remove('flash-correct');
        }
        setTimeout(goNextQuestion, 700);
      }
    }
 
    function startQuiz(count) {
      currentMode      = 'normal';
      correctCount     = 0;
      wrongQuestions   = [];
      currentIndex     = 0;
      currentQuestions = selectQuestions(count);
      quizScreen.classList.remove('flash-correct', 'flash-wrong');
      showScreen(quizScreen);
      renderQuestion();
    }
 
    function showResult() {
      clearTimer();
      showScreen(resultScreen);
 
      const total = currentQuestions.length;
      const pass  = correctCount >= Math.ceil(total * PASS_RATE);
 
      resultMessage.textContent = `大変お疲れ様でした。あなたの正解数は ${correctCount}／${total} です。`;
      resultBadge.textContent   = `${correctCount}問正解！！`;
      resultBadge.className     = 'result-badge ' + (pass ? 'pass' : 'fail');
      resultScreen.classList.remove('pass', 'fail');
      resultScreen.classList.add(pass ? 'pass' : 'fail');

      const challengeEl = document.getElementById('result-challenge');
      challengeEl.textContent = wrongQuestions.length > 0 ? 'また挑戦してね！次こそ全問正解☆' : '';
 
      if (pass) {
        makeConfetti();
        confetti.classList.add('show');
      } else {
        confetti.classList.remove('show');
        confetti.innerHTML = '';
      }
 
      retryLink.style.display = wrongQuestions.length > 0 ? 'inline' : 'none';
    }
 
    function startRetryWrongQuestions() {
      if (!wrongQuestions.length) { backToHome(); return; }
      currentMode      = 'retry';
      currentIndex     = 0;
      currentQuestions = [...wrongQuestions];
      quizScreen.classList.remove('flash-correct', 'flash-wrong');
      showScreen(quizScreen);
      renderQuestion();
    }
 
    function backToHome() {
      clearTimer();
      currentMode      = 'normal';
      currentIndex     = 0;
      currentQuestions = [];
      wrongQuestions   = [];
      correctCount     = 0;
      quizScreen.classList.remove('flash-correct', 'flash-wrong');
      resultScreen.classList.remove('pass', 'fail');
      confetti.classList.remove('show');
      confetti.innerHTML = '';
      showScreen(landingScreen);
    }
 
    // ===== イベント =====
    enterBtn.addEventListener('click', () => {
      openDoorThen(() => showScreen(menuScreen));
    });
 
    nicknameInput.addEventListener('input', () => {
      if (nicknameInput.value.trim()) nicknameError.textContent = '';
    });
 
    menuButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!validateNickname()) return;
        const count = Number(btn.dataset.count);
        startQuiz(count);
      });
    });
 
    maruBtn.addEventListener('click',  () => handleAnswer('○'));
    batsuBtn.addEventListener('click', () => handleAnswer('×'));
 
    retryLink.addEventListener('click', () => { startRetryWrongQuestions(); });
    homeLink.addEventListener('click',  () => { backToHome(); });
 
    window.addEventListener('resize',            fitQuestionText);
    window.addEventListener('orientationchange', fitQuestionText);
 
    document.addEventListener('DOMContentLoaded', () => { fitQuestionText(); });
  </script>
</body>
</html>
